events {
    worker_connections 1024;
}

http {
    # Docker's embedded DNS. Using a resolver + variables in proxy_pass forces
    # nginx to re-resolve upstream hostnames at request time (within the TTL)
    # instead of caching the IP at startup — so recreating a backend/frontend
    # container (which changes its IP) no longer 502s every request.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    server {
        listen 80;
        server_name localhost;
        client_max_body_size 100M;

        # ── /neuradex/* routing (ngrok public paths) ─────────────────────────

        # /neuradex/dev/logs → Kibana (no rewrite; Kibana strips its own basePath)
        location ^~ /neuradex/dev/logs {
            set $kibana_up kibana:5601;
            proxy_pass http://$kibana_up;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 90;
        }

        # /neuradex/dev → docs service (strip prefix; serve maps path to build/)
        location ^~ /neuradex/dev {
            set $docs_up docs:3001;
            rewrite ^/neuradex/dev/?(.*)$ /$1 break;
            proxy_pass http://$docs_up;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # /neuradex/backend → backend API (strips /neuradex/backend prefix)
        # Swagger at /neuradex/backend/docs works because uvicorn runs with
        # --root-path /neuradex/backend so FastAPI generates correct openapi URLs
        location ^~ /neuradex/backend {
            set $backend_up backend:8000;
            rewrite ^/neuradex/backend/?(.*)$ /$1 break;
            proxy_pass http://$backend_up;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # /neuradex → frontend (strips /neuradex prefix)
        # React Router runs with basename="/neuradex" to match browser URL
        location ^~ /neuradex {
            set $frontend_up frontend:3000;
            rewrite ^/neuradex/?(.*)$ /$1 break;
            proxy_pass http://$frontend_up;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # ── Root routing ──────────────────────────────────────────────────────

        # Exact root → landing page served from nginx itself
        location = / {
            root /usr/share/nginx/html;
            try_files /index.html =404;
        }

        location / {
            set $frontend_up frontend:3000;
            proxy_pass http://$frontend_up;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        location /api/ {
            set $backend_up backend:8000;
            proxy_pass http://$backend_up;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /socket.io/ {
            set $backend_up backend:8000;
            proxy_pass http://$backend_up;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /health {
            set $backend_up backend:8000;
            proxy_pass http://$backend_up;
            access_log off;
        }
    }
}
