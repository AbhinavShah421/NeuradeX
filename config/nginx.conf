events {
    worker_connections 1024;
}

http {
    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:3000;
    }

    upstream docs {
        server docs:3001;
    }

    upstream kibana {
        server kibana:5601;
    }

    server {
        listen 80;
        server_name localhost;
        client_max_body_size 100M;

        # ── /neuradex/* routing (ngrok public paths) ─────────────────────────

        # /neuradex/dev/logs → Kibana (no rewrite; Kibana strips its own basePath)
        location ^~ /neuradex/dev/logs {
            proxy_pass http://kibana;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 90;
        }

        # /neuradex/dev → docs service (strip prefix; serve maps path to build/)
        location ^~ /neuradex/dev {
            rewrite ^/neuradex/dev/?(.*)$ /$1 break;
            proxy_pass http://docs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # /neuradex/backend → backend API (strips /neuradex/backend prefix)
        # Swagger at /neuradex/backend/docs works because uvicorn runs with
        # --root-path /neuradex/backend so FastAPI generates correct openapi URLs
        location ^~ /neuradex/backend {
            rewrite ^/neuradex/backend/?(.*)$ /$1 break;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # /neuradex → frontend (strips /neuradex prefix)
        # React Router runs with basename="/neuradex" to match browser URL
        location ^~ /neuradex {
            rewrite ^/neuradex/?(.*)$ /$1 break;
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # ── Root routing ──────────────────────────────────────────────────────

        # Exact root → landing page served from nginx itself
        location = / {
            root /usr/share/nginx/html;
            try_files /index.html =404;
        }

        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /socket.io/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /health {
            proxy_pass http://backend;
            access_log off;
        }
    }
}
