server.port=8010
spring.application.name=risk-engine

spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

spring.rabbitmq.listener.simple.acknowledge-mode=auto
spring.rabbitmq.listener.simple.prefetch=1

# Retry a failed ensemble.decision message up to 3 times with exponential backoff
# (1s, 2s, 4s) before it is handed to the RepublishMessageRecoverer and published to
# ensemble.decision.dlq (see RabbitConfig) instead of being silently dropped.
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=1000
spring.rabbitmq.listener.simple.retry.multiplier=2.0
spring.rabbitmq.listener.simple.retry.max-interval=10000

risk.min-confidence=${MIN_CONFIDENCE:0.60}
risk.max-position-pct=${MAX_POSITION_PCT:0.05}
risk.max-risk-pct=${MAX_RISK_PCT:0.02}
risk.atr-stop-multiplier=${ATR_STOP_MULT:2.0}
risk.atr-profit-multiplier=${ATR_PROFIT_MULT:3.0}
risk.default-portfolio-value=${DEFAULT_PORTFOLIO_VALUE:100000.0}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
