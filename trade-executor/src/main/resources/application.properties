server.port=8011
spring.application.name=trade-executor

spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

spring.rabbitmq.listener.simple.acknowledge-mode=auto
spring.rabbitmq.listener.simple.prefetch=1

# Retry a failed risk.validated message (order placement/paper trade) up to 3 times
# with exponential backoff (1s, 2s, 4s) before it is handed to the
# RepublishMessageRecoverer and published to risk.validated.dlq (see RabbitConfig)
# instead of being rejected and lost.
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=1000
spring.rabbitmq.listener.simple.retry.multiplier=2.0
spring.rabbitmq.listener.simple.retry.max-interval=10000

trade.paper-mode=${PAPER_TRADING_MODE:true}
groww.api.base-url=${GROWW_API_BASE_URL:https://groww.in/v1/api}
groww.api.token=${GROWW_API_TOKEN:}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
