
services:
  # ── Infrastructure ────────────────────────────────────────────────────────────

  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: stock-prediction-postgres
    environment:
      POSTGRES_USER: stock_user
      POSTGRES_PASSWORD: stock_password
      POSTGRES_DB: stock_prediction_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_timescale.sql:/docker-entrypoint-initdb.d/init_timescale.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stock_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stock-prediction-network
    deploy:
      resources:
        limits:
          memory: 256M   # 101MB actual; halved — postgres rarely spikes here
          cpus: '0.5'

  mongodb:
    image: mongo:6
    container_name: stock-prediction-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: stock_admin
      MONGO_INITDB_ROOT_PASSWORD: stock_password
      MONGO_INITDB_DATABASE: stock_prediction
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stock-prediction-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  redis:
    image: redis:7-alpine
    container_name: stock-prediction-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stock-prediction-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.3'

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: stock-prediction-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping && rabbitmq-diagnostics -q check_port_connectivity
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - stock-prediction-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'

  influxdb:
    image: influxdb:2-alpine
    container_name: stock-prediction-influxdb
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: stock_user
      DOCKER_INFLUXDB_INIT_PASSWORD: stock_password
      DOCKER_INFLUXDB_INIT_ORG: stock-org
      DOCKER_INFLUXDB_INIT_BUCKET: stock-metrics
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: stock-token
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stock-prediction-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: stock-prediction-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx768m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 15s
      timeout: 10s
      retries: 12
    networks:
      - stock-prediction-network
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: '0.5'

  kibana:
    image: kibana:8.11.0
    container_name: stock-prediction-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
      - SERVER_BASEPATH=/neuradex/dev/logs
      - SERVER_REWRITEBASEPATH=true
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - stock-prediction-network
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '0.3'

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.0
    container_name: stock-prediction-mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    # Fewer gunicorn workers + a longer timeout stop the WORKER TIMEOUT → SIGKILL
    # (OOM) loop: 4 default workers don't fit in the memory box, and the default
    # 30s timeout is too short for SQLite-backed bursts when metrics are logged.
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --workers 2
      --gunicorn-opts "--timeout 120 --graceful-timeout 30"
    # The mlflow image ships no curl — use Python (always present) to probe /health.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/health').status==200 else 1)"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 30s
    networks:
      - stock-prediction-network
    deploy:
      resources:
        limits:
          memory: 1280M
          cpus: '0.5'

  # ── Existing Backend (monolith, remains during transition) ────────────────────

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: stock-prediction-backend
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: postgres
      MONGODB_HOST: mongodb
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      INFLUXDB_HOST: influxdb
      LLM_API_URL: http://ollama:11434
      ELASTICSEARCH_URL: http://elasticsearch:9200
      LLM_PROVIDER: ollama
      ANTHROPIC_API_KEY: ""
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
      LLM_MODEL: ${OLLAMA_MODEL:-llama3.2}
      ANGEL_API_KEY: ${ANGEL_API_KEY:-}
      ANGEL_CLIENT_CODE: ${ANGEL_CLIENT_CODE:-}
      ANGEL_PIN: ${ANGEL_PIN:-}
      ANGEL_TOTP_SECRET: ${ANGEL_TOTP_SECRET:-}
      NEWS_MIN_CONFIDENCE: "0.55"
      NEWS_MIN_SCORE: "0.3"
      BACKEND_ROLE: "api"       # HTTP-only: no session runner / ML sweeps here
      CANDLE_STORE_DIR: /data/candles
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      # Read access to the Docker Engine API powers the system-status panel
      # (list containers, view logs, start/stop/restart). Operator-only.
      - /var/run/docker.sock:/var/run/docker.sock
      # Container json-log files, so the panel can truncate ("clear") a service's
      # logs on demand (Docker has no API for this — the file must be truncated).
      - /var/lib/docker/containers:/var/lib/docker/containers
      # 1s tick-store dataset (shared with session-runner, which captures it)
      - candle_data:/data/candles
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - stock-prediction-network
    command: python -m uvicorn app.main:app_sio --host 0.0.0.0 --port 8000 --workers 1 --root-path /neuradex/backend
    deploy:
      resources:
        limits:
          memory: 2G        # needs headroom for GBM training calls from session-runner
          cpus: '1.5'

  # ── Session Runner (CPU-isolated background worker) ───────────────────────────
  # Advances all live/backtest trading sessions server-side. Separated from the
  # HTTP backend so heavy ensemble compute (99% CPU spikes) never starves API
  # responses. Uses the same Docker image; BACKEND_ROLE=runner activates only the
  # session runner background task (no HTTP routes served under load).

  session-runner:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: stock-prediction-session-runner
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: postgres
      MONGODB_HOST: mongodb
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      INFLUXDB_HOST: influxdb
      LLM_API_URL: http://ollama:11434
      ELASTICSEARCH_URL: http://elasticsearch:9200
      LLM_PROVIDER: ollama
      ANTHROPIC_API_KEY: ""
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
      LLM_MODEL: ${OLLAMA_MODEL:-llama3.2}
      NEWS_MIN_CONFIDENCE: "0.55"
      NEWS_MIN_SCORE: "0.3"
      BACKEND_ROLE: "runner"    # session runner + ML sweeps only, no HTTP load
      CANDLE_STORE_DIR: /data/candles
    volumes:
      - ./backend/app:/app/app
      - candle_data:/data/candles      # 1s tick-store dataset (shared read/write)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - stock-prediction-network
    command: python -m uvicorn app.main:app_sio --host 0.0.0.0 --port 8001 --workers 1
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'

  # ── Phase 1: Market Data Service ──────────────────────────────────────────────

  market-data-service:
    build:
      context: ./market-data-service
      dockerfile: Dockerfile
    container_name: stock-prediction-market-data
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: postgres
      MONGODB_HOST: mongodb
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      ELASTICSEARCH_URL: http://elasticsearch:9200
      SERVICE_NAME: market-data-service
      SERVICE_PORT: "8001"
      WATCHLIST: "RELIANCE,TCS,INFY,HDFCBANK,ICICIBANK,KOTAKBANK,BAJFINANCE,SBIN,WIPRO,AXISBANK,HINDUNILVR,MARUTI,NESTLEIND,TITAN,TECHM"
      TICK_INTERVAL_SECONDS: "60"
      NEWS_INTERVAL_SECONDS: "300"
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - stock-prediction-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'

  # ── Phase 2: Agent Services ───────────────────────────────────────────────────

  technical-agent:
    build:
      context: ./technical-agent
      dockerfile: Dockerfile
    container_name: stock-prediction-technical-agent
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      ELASTICSEARCH_URL: http://elasticsearch:9200
      SERVICE_NAME: technical-agent
      SERVICE_PORT: "8002"
      MLFLOW_TRACKING_URI: http://mlflow:5000
      CANDLE_HISTORY_LIMIT: "200"
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - stock-prediction-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'

  sentiment-agent:
    build:
      context: ./sentiment-agent
      dockerfile: Dockerfile
    container_name: stock-prediction-sentiment-agent
    env_file:
      - ./backend/.env
    environment:
      MONGODB_HOST: mongodb
      RABBITMQ_HOST: rabbitmq
      ELASTICSEARCH_URL: http://elasticsearch:9200
      SERVICE_NAME: sentiment-agent
      SERVICE_PORT: "8003"
      MLFLOW_TRACKING_URI: http://mlflow:5000
      FINBERT_MODEL: "ProsusAI/finbert"
      SENTIMENT_WINDOW_MINUTES: "60"
      # Constrain torch/transformers to a single math thread. This both trims the
      # per-thread memory arenas that spiked past the old 1G cap (→ OOM/137) and
      # stops the CPU-limited container from thrashing while loading the model.
      OMP_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      TOKENIZERS_PARALLELISM: "false"
    ports:
      - "8003:8003"
    volumes:
      - finbert_cache:/root/.cache/huggingface
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - stock-prediction-network
    restart: unless-stopped     # self-heal: don't stay dead after a transient crash
    deploy:
      resources:
        limits:
          # FinBERT (torch + transformers + ProsusAI/finbert) peaks ~1.5-1.8G while
          # the pipeline loads on the first /score call; 1G OOM-killed it (137). 2G —
          # the same ceiling as the backend — gives headroom without over-committing 8G host.
          memory: 2048M
          cpus: '1.0'

  macro-agent:
    build:
      context: ./macro-agent
      dockerfile: Dockerfile
    container_name: stock-prediction-macro-agent
    env_file:
      - ./backend/.env
    environment:
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      ELASTICSEARCH_URL: http://elasticsearch:9200
      SERVICE_NAME: macro-agent
      SERVICE_PORT: "8004"
      MACRO_REFRESH_SECONDS: "3600"
    ports:
      - "8004:8004"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - stock-prediction-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.2'

  pattern-agent:
    build:
      context: ./pattern-agent
      dockerfile: Dockerfile
    container_name: stock-prediction-pattern-agent
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: postgres
      RABBITMQ_HOST: rabbitmq
      ELASTICSEARCH_URL: http://elasticsearch:9200
      SERVICE_NAME: pattern-agent
      SERVICE_PORT: "8005"
      CANDLE_HISTORY_LIMIT: "100"
    ports:
      - "8005:8005"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - stock-prediction-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'

  rl-agent:
    build:
      context: ./rl-agent
      dockerfile: Dockerfile
    container_name: stock-prediction-rl-agent
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: postgres
      RABBITMQ_HOST: rabbitmq
      REDIS_HOST: redis
      ELASTICSEARCH_URL: http://elasticsearch:9200
      SERVICE_NAME: rl-agent
      SERVICE_PORT: "8006"
      MLFLOW_TRACKING_URI: http://mlflow:5000
      POLICY_MODEL_NAME: "rl-trading-policy"
    ports:
      - "8006:8006"
    volumes:
      - rl_models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - stock-prediction-network
    deploy:
      resources:
        limits:
          memory: 384M   # 139MB actual; 384M gives headroom for PPO training bursts
          cpus: '0.5'

  # ── Phase 3: Ensemble Decision Engine ────────────────────────────────────────

  ensemble-engine:
    build:
      context: ./ensemble-engine
      dockerfile: Dockerfile
    container_name: stock-prediction-ensemble-engine
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      ELASTICSEARCH_URL: http://elasticsearch:9200
      SERVICE_NAME: ensemble-engine
      SERVICE_PORT: "8007"
      AGENT_SIGNAL_TIMEOUT_SECONDS: "5"
      MIN_CONFIDENCE_TO_TRADE: "0.60"
    ports:
      - "8007:8007"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - stock-prediction-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'

  # ── Phase 4: Feedback Learning Service ───────────────────────────────────────

  feedback-service:
    build:
      context: ./feedback-service
      dockerfile: Dockerfile
    container_name: stock-prediction-feedback-service
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: postgres
      RABBITMQ_HOST: rabbitmq
      REDIS_HOST: redis
      ELASTICSEARCH_URL: http://elasticsearch:9200
      SERVICE_NAME: feedback-service
      SERVICE_PORT: "8012"
      RETRAIN_THRESHOLD: "500"
      WEIGHT_LEARNING_RATE: "0.05"
    ports:
      - "8012:8012"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - stock-prediction-network
    deploy:
      resources:
        limits:
          memory: 128M   # 47MB actual; lightweight weight-update consumer
          cpus: '0.3'

  # ── Stock Scanner ─────────────────────────────────────────────────────────────

  stock-scanner:
    build:
      context: ./stock-scanner
      dockerfile: Dockerfile
    container_name: stock-prediction-stock-scanner
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      BACKEND_URL: "http://backend:8000"
      ELASTICSEARCH_URL: http://elasticsearch:9200
      SERVICE_NAME: stock-scanner
      SCAN_INTERVAL: "1200"
      SCAN_MIN_VOLUME: "300000"
      SCAN_MIN_ATR_PCT: "1.2"
      SCAN_TOP_N: "15"
      SCAN_PREMARKET_MIN: "540"
      SCAN_MARKET_OPEN_MIN: "555"
      SCAN_MARKET_CLOSE_MIN: "930"
      SCAN_POSTMARKET_MIN: "940"
    ports:
      - "8014:8014"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - stock-prediction-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'

  # ── Autopilot Service ─────────────────────────────────────────────────────────

  autopilot-service:
    build:
      context: ./autopilot-service
      dockerfile: Dockerfile
    container_name: stock-prediction-autopilot
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      BACKEND_URL: "http://backend:8000"
      ELASTICSEARCH_URL: http://elasticsearch:9200
      SERVICE_NAME: autopilot-service
      AUTOPILOT_MAX_SESSIONS: "15"
      AUTOPILOT_CAPITAL: "50000"
      AUTOPILOT_TICK_SECS: "60"
      AUTOPILOT_MAX_HOLD_MINUTES: "0"
      AUTOPILOT_BACKTEST_SPEED: "1"
      AUTOPILOT_BACKTEST_BATCH_SIZE: "7"
      AUTOPILOT_BACKTEST_POLL: "15"
      AUTOPILOT_BACKTEST_MAX_DAYS_BACK: "90"
      AUTOPILOT_BACKTEST_MORNING_CUTOFF: "540"
      AUTOPILOT_BACKTEST_EVENING_RESUME: "940"
    ports:
      - "8015:8015"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - stock-prediction-network
    deploy:
      resources:
        limits:
          memory: 128M   # 44MB actual; simple polling loop
          cpus: '0.3'

  # ── Ollama (local LLM) ───────────────────────────────────────────────────────
  # Runs the Ollama server inside Docker so the host doesn't need Ollama installed.
  # ollama-init pulls llama3.2 on first boot (skipped if the model is already cached).

  ollama:
    image: ollama/ollama:latest
    container_name: stock-prediction-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - stock-prediction-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list 2>/dev/null && exit 0 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'

  ollama-init:
    image: ollama/ollama:latest
    container_name: stock-prediction-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    networks:
      - stock-prediction-network
    entrypoint: ["/bin/sh", "-c", "ollama pull llama3.2 && echo 'llama3.2 ready'"]
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # ── Groww Live-Feed Service ───────────────────────────────────────────────────
  # Isolated so the heavy growwapi SDK (pydantic/pandas/protobuf pins) can't clash
  # with the backend. Streams real-time LTPs to Redis for paper trading.
  groww-feed-service:
    build:
      context: ./groww-feed-service
      dockerfile: Dockerfile
    container_name: stock-prediction-groww-feed
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      SERVICE_NAME: groww-feed-service
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - stock-prediction-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.4'

  # ── Sentiment Service ─────────────────────────────────────────────────────────

  sentiment-service:
    build:
      context: ./sentiment-service
      dockerfile: Dockerfile
    container_name: stock-prediction-sentiment
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      ELASTICSEARCH_URL: http://elasticsearch:9200
      SERVICE_NAME: sentiment-service
      LLM_PROVIDER: ollama
      ANTHROPIC_API_KEY: ""
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
      LLM_MODEL: ${OLLAMA_MODEL:-llama3.2}
      LLM_API_URL: http://ollama:11434
      SENTIMENT_INTERVAL: "900"
      SENTIMENT_TTL: "5400"
    ports:
      - "8016:8016"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - stock-prediction-network
    deploy:
      resources:
        limits:
          memory: 256M   # 55MB actual; LLM calls are external, no local model
          cpus: '0.5'

  # ── Model Trainer ─────────────────────────────────────────────────────────────

  model-trainer:
    build:
      context: ./model-trainer
      dockerfile: Dockerfile
    container_name: stock-prediction-model-trainer
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: postgres
      RABBITMQ_HOST: rabbitmq
      MLFLOW_TRACKING_URI: http://mlflow:5000
      ELASTICSEARCH_URL: http://elasticsearch:9200
      SERVICE_NAME: model-trainer
      SERVICE_PORT: "8013"
      TRAIN_DAYS: "365"
      RL_TIMESTEPS: "200000"
      RETRAIN_SCHEDULE_HOURS: "24"
    ports:
      - "8013:8013"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mlflow:
        condition: service_started
    networks:
      - stock-prediction-network
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '1.0'

  # ── Risk Engine ───────────────────────────────────────────────────────────────

  risk-engine:
    build:
      context: ./risk-engine
      dockerfile: Dockerfile
    container_name: stock-prediction-risk-engine
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      MIN_CONFIDENCE: "0.60"
      MAX_POSITION_PCT: "0.05"
      MAX_RISK_PCT: "0.02"
      ATR_STOP_MULT: "2.0"
      ATR_PROFIT_MULT: "3.0"
      DEFAULT_PORTFOLIO_VALUE: "100000.0"
    ports:
      - "8010:8010"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - stock-prediction-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.2'

  # ── Trade Executor ────────────────────────────────────────────────────────────

  trade-executor:
    build:
      context: ./trade-executor
      dockerfile: Dockerfile
    container_name: stock-prediction-trade-executor
    env_file:
      - ./backend/.env
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      PAPER_TRADING_MODE: "true"
    ports:
      - "8011:8011"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - stock-prediction-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'

  # ── Frontend & Proxy ──────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: stock-prediction-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_SOCKET_URL: http://localhost:8000
    depends_on:
      - backend
    networks:
      - stock-prediction-network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.2'

  docs:
    build:
      context: ./docs-site
      dockerfile: Dockerfile
    container_name: stock-prediction-docs
    ports:
      - "3001:3001"
    networks:
      - stock-prediction-network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.2'

  ngrok:
    image: ngrok/ngrok:latest
    restart: "no"                    # token-rotation script manages lifecycle
    container_name: stock-prediction-ngrok
    env_file:
      - path: ./.env.ngrok           # written by scripts/start-ngrok.ps1 per attempt
        required: false              # missing file on first cold boot is safe
    command: http nginx:80 --log stdout
    ports:
      - "4040:4040"
    depends_on:
      - nginx
    networks:
      - stock-prediction-network
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'

  nginx:
    image: nginx:alpine
    container_name: stock-prediction-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/landing.html:/usr/share/nginx/html/index.html:ro
    depends_on:
      - backend
      - frontend
    networks:
      - stock-prediction-network
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  rabbitmq_data:
  influxdb_data:
  elasticsearch_data:
  mlflow_data:
  finbert_cache:
  rl_models:
  candle_data:        # 1-second tick-store dataset (our own real-data warehouse)
  ollama_data:        # Ollama model cache — persists llama3.2 across restarts

networks:
  stock-prediction-network:
    driver: bridge
